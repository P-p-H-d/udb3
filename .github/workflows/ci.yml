name: C/C++ CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest    
    steps:
    - uses: actions/checkout@v4
    - name: CPU Information
      run:  lscpu || echo "CPU information not available"
    - name: Compiler Information
      run:  cc -v
    - name: make
      run: make
    - name: Run insert
      run: l=$(find . -executable -type f|grep -v .git) ; for e in $l ; do echo "$e" ; "$e" ; done
    - name: Run Delete
      run: l=$(find . -executable -type f|grep -v .git) ; for e in $l ; do echo "$e" ; "$e" -d ; done
      
      
 
